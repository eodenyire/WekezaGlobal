apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wgi

bases:
  - ../../base

# Increase replica counts for production
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: wgi-backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: wgi-frontend

# Production image tags — override at deploy time with:
#   kustomize edit set image ghcr.io/eodenyire/wekezaglobal/backend=ghcr.io/eodenyire/wekezaglobal/backend:v1.0.0
images:
  - name: ghcr.io/eodenyire/wekezaglobal/backend
    newTag: latest
  - name: ghcr.io/eodenyire/wekezaglobal/frontend
    newTag: latest

# Additional labels applied to all resources in production
commonLabels:
  environment: production
